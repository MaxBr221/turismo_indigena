<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="cadastro.js" defer></script>
</head>
<body>

    <header>
        <div class="container">
            <h1>FAÇA SEU CADASTRO</h1>
        </div>
     </header>

     <main>
        <form method="formCadastro">
            <div>
                <label for="text">Nome</label>
                <input type="text" id="nome" placeholder="Nome" required>
            </div>
            <div>
                <label for="text">Telefone</label>
                <input type="number" id="telefone" placeholder="Telefone" required>
            </div>
            <div>
                <label for="email">Login</label>
                <input type="email" id="login" placeholder="Login" required>
            </div>
            <div>
                <label for="password">Senha</label>
                <input type="password"  id="senha" placeholder="Senha" required>
            </div>
            <button type="button" onclick="cadastro()">Cadastrar</button>
            <a href="login.html">Clique aqui caso já seja cadastrado.</a>
        </form>
     </main>
</body>
</html>
