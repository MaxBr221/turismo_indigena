 <!DOCTYPE html>
 <html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Turistico</title>
    <script src="pontoTuristico.js" defer></script>
 </head>
 <body>
    <header>
        <div>
            <h1>
                Pontos Turisticos de Baia da Traição
            </h1>
        </div>
    </header>

    <main>
        <div id="container-pontos">
            <table>
                <thead>
                    <th>Nome</th>
                    <th>Local</th>
                    <th>Informações</th>
                    <th>Avaliações</th>
                </thead>
                <tbody id="lista-pontos"></tbody>
            </table>
        </div>

        <div class="form">
            <input type="search" id="pontos" onkeyup="pontos()" placeholder="Digite o nome do Ponto Turistico">
            <button type="button" id="pontos">Pesquisar</button>

        </div>
    </main>

    
    <footer>
        <div>
            <b>Turismo Indigena</b>
        </div>
    </footer>



    
 </body>
 </html>
