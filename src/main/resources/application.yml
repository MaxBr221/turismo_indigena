server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/turismo?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER}
    password: ${DB_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false
    repair-on-migrate: true
    locations: classpath:db/migration


api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}

