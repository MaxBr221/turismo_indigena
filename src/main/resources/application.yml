spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    repair-on-migrate: true
    locations: classpath:db/migration


api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}

